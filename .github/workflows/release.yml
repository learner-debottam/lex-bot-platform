name: Release Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  AWS_REGION: eu-west-2
  TF_VERSION: 1.14.7

jobs:

  #################################################
  # Versioning (Monorepo)
  #################################################
  release:
    runs-on: ubuntu-latest

    outputs:
      released: ${{ steps.release.outputs.releases_created }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/create-github-app-token@v2
        id: token
        with:
          api-id: ${{ secrets.GITHUB_APP_ID }}
          private-key: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.token.outputs.token }}
          monorepo-tags: true

  #################################################
  # DEV Deployment
  #################################################
  deploy-dev:
    needs: release
    if: ${{ needs.release.outputs.released == 'true' }}
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment-to-deploy: dev
      runner-name: ubuntu-latest
    secrets: inherit

  #################################################
  # TEST Deployment (manual approval via GitHub Environment)
  #################################################
  deploy-test:
    needs: deploy-dev
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment-to-deploy: test
      runner-name: ubuntu-latest
    secrets: inherit

  #################################################
  # PRE-PROD Deployment
  #################################################
  deploy-preprod:
    needs: deploy-test
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment-to-deploy: pre-prod
      runner-name: ubuntu-latest
    secrets: inherit

  #################################################
  # PROD Deployment
  #################################################
  deploy-prod:
    needs: deploy-preprod
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment-to-deploy: prod
      runner-name: ubuntu-latest
    secrets: inherit