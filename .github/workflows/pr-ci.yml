name: PR CI

on:
  pull_request:
    branches:
      - "*"

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  #################################################
  # Detect Changed Packages
  #################################################
  detect:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set.outputs.packages }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: set
        run: |
          CHANGED=$(git diff --name-only origin/main HEAD | grep '^packages/' || true)
          PKGS=$(echo "$CHANGED" | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n")[:-1]')

          if [ -z "$PKGS" ] || [ "$PKGS" = "[]" ]; then
            echo "packages=[]" >> $GITHUB_OUTPUT
          else
            echo "packages=$PKGS" >> $GITHUB_OUTPUT
          fi

  #################################################
  # Build + Lint + Test + Terraform
  #################################################
  build-test:
    needs: detect
    if: ${{ needs.detect.outputs.packages != '[]' }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        package: ${{ fromJson(needs.detect.outputs.packages) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'packages/**/package-lock.json'
      - name: Install + Lint + Build
        run: |
          PKG=packages/${{ matrix.package }}

          if [ -f "$PKG/package.json" ]; then
            npm ci --prefix $PKG
            npm run lint --prefix $PKG
            npm run typecheck --prefix $PKG
            npm run build --prefix $PKG
          fi

      - name: Run Tests
        run: |
          PKG=packages/${{ matrix.package }}
          if ls $PKG/test/*.ts 1> /dev/null 2>&1; then
            npm run test --prefix $PKG
          else
            echo "No tests"
          fi

      #################################################
      # Terraform Lint + Validate
      #################################################
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - name: Terraform Checks
        run: |
          PKG=packages/${{ matrix.package }}

          if [ -d "$PKG/infra" ]; then
            terraform -chdir=$PKG/infra fmt -check
            terraform -chdir=$PKG/infra init -input=false
            terraform -chdir=$PKG/infra validate
          fi

      #################################################
      # TFLint (UPDATED VERSION)
      #################################################
      - uses: terraform-linters/setup-tflint@v5

      - name: Run TFLint
        run: |
          PKG=packages/${{ matrix.package }}
          if [ -d "$PKG/infra" ]; then
            tflint $PKG/infra
          fi

  #################################################
  # Bot Config Validation
  #################################################
  validate-config:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - uses: actions/checkout@v5

      - name: Run Validation
        run: |
          bash scripts/validate-bot-config.sh
          bash scripts/validate-lambda-links.sh