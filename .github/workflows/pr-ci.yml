name: PR CI

on:
  pull_request:
    branches:
      - "*"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-2
  TF_VERSION: 1.14.7

jobs:
  #################################################
  # Detect changed packages
  #################################################
  detect:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set.outputs.packages }}
    steps:
      - uses: actions/checkout@v5

      - id: set
        run: |
          CHANGED=$(git diff --name-only origin/main HEAD | grep '^packages/' || true)
          PKGS=$(echo "$CHANGED" | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n")[:-1]')
          echo "packages=$PKGS" >> $GITHUB_OUTPUT

  #################################################
  # Build, Test, Terraform Plan per package
  #################################################
  build-test-plan:
    needs: detect
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ${{ fromJson(needs.detect.outputs.packages) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install / Build / Test
        run: |
          PKG=packages/${{ matrix.package }}
          if [ -f "$PKG/package.json" ]; then
            echo "Installing $PKG..."
            npm ci --prefix $PKG
            npm run build --prefix $PKG || true

            if ls $PKG/test/*.ts 1> /dev/null 2>&1; then
              echo "Running tests for $PKG..."
              npm run test --prefix $PKG
            else
              echo "No tests found in $PKG"
            fi
          fi

      - name: Terraform Plan (if infra exists)
        run: |
          PKG_INFRA=packages/${{ matrix.package }}/infra
          if [ -d "$PKG_INFRA" ]; then
            terraform -chdir="$PKG_INFRA" init -input=false
            terraform -chdir="$PKG_INFRA" validate
            terraform -chdir="$PKG_INFRA" plan -out=tfplan || true
          fi

  #################################################
  # Deploy Dev (reusable workflow)
  #################################################
  deploy-dev:
    needs: build-test-plan
    if: ${{ fromJson(needs.detect.outputs.packages) && fromJson(needs.detect.outputs.packages) != '' }}  # safe check for non-empty array
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment-to-deploy: dev
      runner-name: ubuntu-latest