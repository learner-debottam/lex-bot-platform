name: PR CI

on:
  pull_request:
    branches:
      - "*"
    paths:
      - "packages/**"
      - "modules/**"
      - "infra/**"

permissions:
  contents: read
  pull-requests: write

env:
  AWS_REGION: eu-west-2
  TF_STATE_BUCKET: my-terraform-state-bucket
  TF_LOCK_TABLE: terraform-state-lock
  TERRAFORM_VERSION: 1.5.7
  NODE_VERSION: 24

jobs:
  #################################################
  # Detect Changed Packages
  #################################################
  detect:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set.outputs.packages }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: set
        name: Detect Changed Packages
        run: |
          CHANGED=$(git diff --name-only origin/main HEAD | grep '^packages/' || true)
          PKGS=$(echo "$CHANGED" | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n")[:-1]')

          if [ -z "$PKGS" ] || [ "$PKGS" = "[]" ]; then
            echo "packages=[]" >> $GITHUB_OUTPUT
          else
            echo "packages=$PKGS" >> $GITHUB_OUTPUT
          fi

  #################################################
  # Build + Lint + TypeScript Tests + Terraform Checks
  #################################################
  build-test:
    needs: detect
    if: ${{ needs.detect.outputs.packages != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ${{ fromJson(needs.detect.outputs.packages) }}
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      #################################################
      # Node.js Setup + Build
      #################################################
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'packages/**/package-lock.json'

      - name: Install + Lint + Build
        run: |
          PKG=packages/${{ matrix.package }}
          if [ -f "$PKG/package.json" ]; then
            npm ci --prefix $PKG
            npm run lint --prefix $PKG
            npm run typecheck --prefix $PKG
            npm run build --prefix $PKG
          fi

      - name: Run Tests
        run: |
          PKG=packages/${{ matrix.package }}
          if ls $PKG/test/*.ts 1> /dev/null 2>&1; then
            npm run test --prefix $PKG
          else
            echo "No tests found in $PKG"
          fi

      #################################################
      # Terraform Init + Lint + Validate + Plan
      #################################################
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init + Validate + Plan
        run: |
          PKG=packages/${{ matrix.package }}
          if [ -d "$PKG/infra" ]; then
            echo "Terraform Fmt + Init + Validate + Plan for $PKG"
            terraform -chdir=$PKG/infra fmt -check
            terraform -chdir=$PKG/infra init \
              -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
              -backend-config="key=${{ matrix.package }}/terraform.tfstate" \
              -backend-config="region=${{ env.AWS_REGION }}" \
              -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}" \
              -reconfigure
            terraform -chdir=$PKG/infra validate
            terraform -chdir=$PKG/infra plan -out=${{ matrix.package }}-plan.tfplan
          fi

      - name: TFLint
        uses: terraform-linters/setup-tflint@v5

      - name: Run TFLint
        run: |
          PKG=packages/${{ matrix.package }}
          if [ -d "$PKG/infra" ]; then
            tflint --init
            tflint --chdir=$PKG/infra
          fi

      - name: Run Checkov
        run: |
          PKG=packages/${{ matrix.package }}
          if [ -d "$PKG/infra" ]; then
            checkov -d $PKG/infra
          fi

      - name: Upload Terraform Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-plan
          path: packages/${{ matrix.package }}/infra/${{ matrix.package }}-plan.tfplan

  #################################################
  # Bot Config Validation
  #################################################
  validate-config:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Run Bot Config Validation
        run: |
          bash scripts/validate-bot-config.sh
          bash scripts/validate-lambda-links.sh