name: Deploy Environment

on:
  workflow_call:
    inputs:
      environment-to-deploy:
        required: true
        type: string
      runner-name:
        required: true
        type: string

jobs:

  #################################################
  # Build + Lint + Test
  #################################################
  build:
    runs-on: ${{ inputs.runner-name }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Build All Packages
        run: |
          for pkg in packages/*; do
            if [ -f "$pkg/package.json" ]; then
              npm ci --prefix $pkg
              npm run build --prefix $pkg || true

              if ls $pkg/test/*.ts 1> /dev/null 2>&1; then
                npm run test --prefix $pkg
              else
                echo "No tests in $pkg"
              fi
            fi
          done
  
  #################################################
  # Validate Bot Configs (NEW STEP)
  #################################################
  validate-config:
    runs-on: ${{ inputs.runner-name }}
    needs: build

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run validation
        id: validate
        run: |
          set +e

          bash scripts/validate-bot-config.sh > validation.log 2>&1
          CONFIG_EXIT=$?

          bash scripts/validate-lambda-links.sh >> validation.log 2>&1
          LAMBDA_EXIT=$?

          cat validation.log

          if [ $CONFIG_EXIT -ne 0 ] || [ $LAMBDA_EXIT -ne 0 ]; then
            echo "failed=true" >> $GITHUB_OUTPUT
          else
            echo "failed=false" >> $GITHUB_OUTPUT
          fi

      #############################################
      # PR Comment (ONLY for PRs)
      #############################################
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const log = fs.readFileSync('validation.log', 'utf8');

            const body = `
            ## ❌ Bot Validation Failed

            \`\`\`
            ${log}
            \`\`\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  #############################################
  # Fail pipeline if needed
  #############################################
      - name: Fail if validation failed
        if: steps.validate.outputs.failed == 'true'
        run: exit 1
  #################################################
  # Terraform Plan + Scan
  #################################################
  plan-scan:
    runs-on: ${{ inputs.runner-name }}
    needs: validate-config

    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - run: terraform -chdir=infra init
      - run: terraform -chdir=infra validate
      - run: terraform -chdir=infra plan -var-file="vars/${{ inputs.environment-to-deploy }}.tfvars" -out=tfplan

      - run: terraform -chdir=infra show -json tfplan > tfplan.json

      - uses: bridgecrewio/checkov-action@v12
        with:
          framework: terraform_plan
          file: tfplan.json
          quiet: true

  #################################################
  # Deploy
  #################################################
  deploy:
    runs-on: ${{ inputs.runner-name }}
    needs: plan-scan
    environment: ${{ inputs.environment-to-deploy }}

    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: eu-west-2
          role-to-assume: ${{ secrets.AWS_DEV_ROLE }}

      - uses: hashicorp/setup-terraform@v3

      - run: bash scripts/deploy.sh ${{ inputs.environment-to-deploy }}