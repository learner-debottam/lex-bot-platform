name: CI - Main Branch

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'infra/**'

env:
  AWS_REGION: eu-west-2
  TERRAFORM_VERSION: 1.5.7
  NODE_VERSION: 24
  TF_STATE_BUCKET: my-terraform-state-bucket        # Change to your bucket
  TF_LOCK_TABLE: terraform-state-lock              # Change to your DynamoDB table

jobs:
  #################################################
  # Detect Changed Packages
  #################################################
  detect-changed-packages:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set.outputs.packages }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: set
        run: |
          CHANGED=$(git diff --name-only origin/main HEAD | grep '^packages/' || true)
          PKGS=$(echo "$CHANGED" | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n")[:-1]')
          if [ -z "$PKGS" ] || [ "$PKGS" = "[]" ]; then
            echo "packages=[]" >> $GITHUB_OUTPUT
          else
            echo "packages=$PKGS" >> $GITHUB_OUTPUT
          fi

  #################################################
  # Build + Lint + Test + Terraform Plan + Apply
  #################################################
  build-test-terraform:
    needs: detect-changed-packages
    if: ${{ needs.detect-changed-packages.outputs.packages != '[]' }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        package: ${{ fromJson(needs.detect-changed-packages.outputs.packages) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v5

      # Setup Node.js
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'packages/**/package-lock.json'

      # Install, Lint, Build
      - name: Install + Lint + Build
        run: |
          PKG=packages/${{ matrix.package }}
          if [ -f "$PKG/package.json" ]; then
            npm ci --prefix $PKG
            npm run lint --prefix $PKG
            npm run typecheck --prefix $PKG
            npm run build --prefix $PKG
          fi

      # Run Tests (if exist)
      - name: Run Tests
        run: |
          PKG=packages/${{ matrix.package }}
          if ls $PKG/test/*.ts 1> /dev/null 2>&1; then
            npm run test --prefix $PKG
          else
            echo "No tests for $PKG"
          fi

      #################################################
      # Terraform Init + Plan + Apply
      #################################################
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      # Cache Terraform providers
      - uses: actions/cache@v3
        with:
          path: |
            ~/.terraform.d/plugin-cache
            **/.terraform/providers
          key: terraform-providers-${{ matrix.package }}-${{ hashFiles('packages/' + matrix.package + '/**/*.tf*') }}

      # Terraform Init
      - name: Terraform Init
        working-directory: packages/${{ matrix.package }}/infra
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${matrix.package}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -reconfigure

      # Terraform Plan
      - name: Terraform Plan
        working-directory: packages/${{ matrix.package }}/infra
        run: |
          terraform plan -out=tfplan-${{ matrix.package }}.out
          terraform show -json tfplan-${{ matrix.package }}.out > tfplan-${{ matrix.package }}.json

      - name: Upload Terraform Plan Artifact
        uses: actions/upload-artifact@v3
        with:
          name: tfplan-${{ matrix.package }}
          path: packages/${{ matrix.package }}/infra/tfplan-${{ matrix.package }}.out

      # Terraform Apply (auto-approve)
      - name: Terraform Apply
        working-directory: packages/${{ matrix.package }}/infra
        run: |
          terraform apply -auto-approve tfplan-${{ matrix.package }}.out

      #################################################
      # Terraform Lint + Validate
      #################################################
      - uses: terraform-linters/setup-tflint@v5

      - name: Terraform Checks
        run: |
          PKG=packages/${{ matrix.package }}
          if [ -d "$PKG/infra" ]; then
            terraform fmt -check -recursive $PKG/infra
            terraform validate $PKG/infra
            tflint --init
            tflint --chdir=$PKG/infra
          fi

      #################################################
      # Security Checks (Checkov)
      #################################################
      - name: Run Checkov
        run: |
          PKG=packages/${{ matrix.package }}
          if [ -d "$PKG/infra" ]; then
            checkov -d $PKG/infra --quiet
          fi

      #################################################
      # Bot Config Validation
      #################################################
      - name: Validate Bot Config
        run: |
          bash scripts/validate-bot-config.sh
          bash scripts/validate-lambda-links.sh