# Main branch pipeline — release automation (release-please), Node CI, Terraform plan → apply.
#
# Flow (happy path on push to main):
#   1. release-please opens / updates release PRs (requires conventional commits + manifest files).
#   2. Changed packages under packages/* are detected from the pushed commits.
#   3. Node jobs validate every package.json discovered under each touched package.
#   4. Terraform plans to S3-backed state per package × environment, uploads plan artifacts.
#   5. Apply job downloads the matching artifact and runs terraform apply with that plan binary.
#
# Prerequisites (high level):
# - GitHub OIDC → AWS: repository secret AWS_ROLE_TO_ASSUME or AWS_ASSUME_ROLE (or env-specific secrets below).
# - Optional secrets for multi-account: AWS_ROLE_TO_ASSUME_DEV / AWS_ROLE_TO_ASSUME_PROD (see Terraform Apply job).
# - Repository variables (optional): AWS_REGION, TF_STATE_BUCKET, TF_LOCK_TABLE, TERRAFORM_VERSION, NODE_VERSION, TF_LOG_LEVEL.
# - infra/vars/<env>.tfvars for each *.tfvars discovered under infra/vars/.
# - Release Please: .release-please-config.json and .release-please-manifest.json at repo root
#   (see https://github.com/googleapis/release-please/blob/main/docs/manifest-releaser.md ).
# - Release PRs / “Actions is not permitted to create or approve pull requests”:
#   • Repo: Settings → Actions → General → Workflow permissions → enable “Read and write permissions”
#     AND check “Allow GitHub Actions to create and approve pull requests”.
#     https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/enabling-features-for-your-repository/managing-github-actions-settings-for-a-repository#preventing-github-actions-from-creating-or-approving-pull-requests
#   • Or set secret RELEASE_PLEASE_TOKEN to a PAT (classic: repo scope; fine-grained: Contents + Pull requests
#     write). Prefer PAT anyway so other workflows still run on release-please PRs.

name: Main — CI, Release, Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      enable_tf_debug:
        description: "Set TF_LOG=DEBUG for all Terraform steps"
        required: false
        type: boolean
        default: false
      run_all_packages:
        description: "Run every package under packages/* (ignore change detection)"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-2' }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || 'debottam-learner-terraform-state-bucket' }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || 'terraform-state-lock' }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION || '1.5.7' }}
  NODE_VERSION: ${{ vars.NODE_VERSION || '24' }}

jobs:
  release-please:
    name: Release Please
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v5

      - name: Run release-please (manifest-driven monorepo)
        uses: googleapis/release-please-action@v4
        id: release
        with:
          # Prefer PAT so downstream workflows still trigger after merges from release PRs.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Log release-please outcome
        if: always()
        run: |
          echo "releases_created=${{ steps.release.outputs.releases_created }}"
          echo "prs_created=${{ steps.release.outputs.prs_created }}"

  detect-packages:
    name: Detect changed packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      packages_json: ${{ steps.matrix.outputs.packages_json }}
      tf_matrix_json: ${{ steps.matrix.outputs.tf_matrix_json }}
      matrix_empty: ${{ steps.matrix.outputs.matrix_empty }}

    steps:
      - name: Checkout (full history for diffs)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute changed packages & Terraform matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail

          json_array_from_lines() {
            jq -R -s -c 'split("\n") | map(select(length > 0))'
          }

          collect_packages_from_paths() {
            awk -F/ '
              /^packages\// && NF >= 2 { print $2 }
            ' | sort -u
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ github.event.inputs.run_all_packages }}" = "true" ]; then
            # Manual full sweep of every package directory (operations / hotfix use-case).
            PACKAGES_JSON="$(find packages -mindepth 1 -maxdepth 1 -type d -printf '%f\n' 2>/dev/null | sort -u | json_array_from_lines)"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              CHANGED_FILES="$(git diff --name-only HEAD~1 HEAD)"
            else
              CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r HEAD)"
            fi
            PKG_LINES="$(printf '%s\n' "${CHANGED_FILES}" | collect_packages_from_paths || true)"
            if [ -z "${PKG_LINES}" ]; then
              PACKAGES_JSON='[]'
            else
              PACKAGES_JSON="$(printf '%s\n' "${PKG_LINES}" | json_array_from_lines)"
            fi
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "${BEFORE}" ] || [ "${BEFORE}" = "0000000000000000000000000000000000000000" ]; then
              CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r HEAD)"
            else
              CHANGED_FILES="$(git diff --name-only "${BEFORE}" "${GITHUB_SHA}")"
            fi
            PKG_LINES="$(printf '%s\n' "${CHANGED_FILES}" | collect_packages_from_paths || true)"
            if [ -z "${PKG_LINES}" ]; then
              PACKAGES_JSON='[]'
            else
              PACKAGES_JSON="$(printf '%s\n' "${PKG_LINES}" | json_array_from_lines)"
            fi
          fi

          if [ "${PACKAGES_JSON}" = "[]" ]; then
            echo "matrix_empty=true" >> "$GITHUB_OUTPUT"
          else
            echo "matrix_empty=false" >> "$GITHUB_OUTPUT"
          fi

          if compgen -G "infra/vars/*.tfvars" > /dev/null; then
            ENV_JSON="$(find infra/vars -maxdepth 1 -name '*.tfvars' -printf '%f\n' \
              | sed 's/\.tfvars$//' | sort -u | json_array_from_lines)"
          else
            echo "::warning::infra/vars/*.tfvars not found — defaulting to [dev]"
            ENV_JSON='["dev"]'
          fi

          TF_SLUGS=""
          if [ "${PACKAGES_JSON}" != "[]" ]; then
            while IFS= read -r slug; do
              [ -z "${slug}" ] && continue
              if compgen -G "packages/${slug}/infra/*.tf" > /dev/null; then
                TF_SLUGS="${TF_SLUGS}${slug}"$'\n'
              fi
            done < <(echo "${PACKAGES_JSON}" | jq -r '.[]')
          fi

          if [ -z "$(echo -n "${TF_SLUGS}" | tr -d '\n')" ]; then
            TF_PACKAGES_JSON='[]'
          else
            TF_PACKAGES_JSON="$(printf '%s\n' "${TF_SLUGS}" | sort -u | json_array_from_lines)"
          fi

          TF_MATRIX="$(jq -nc --argjson pkgs "$TF_PACKAGES_JSON" --argjson envs "$ENV_JSON" '
            if ($pkgs | length) == 0 then []
            else
              [ $pkgs[] as $p | $envs[] as $e | { package: $p, environment: $e } ]
            end
          ')"

          echo "packages_json=${PACKAGES_JSON}" >> "$GITHUB_OUTPUT"
          echo "tf_matrix_json=${TF_MATRIX}" >> "$GITHUB_OUTPUT"

          echo "packages=${PACKAGES_JSON}"
          echo "terraform_matrix=${TF_MATRIX}"

  node-ci:
    name: Node — ${{ matrix.package }}
    needs: detect-packages
    if: needs.detect-packages.outputs.matrix_empty != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-packages.outputs.packages_json) }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            packages/**/package-lock.json

      - name: npm ci / lint / typecheck / build / test
        shell: bash
        run: |
          set -euo pipefail
          PKG_ROOT="packages/${{ matrix.package }}"
          if [ ! -d "${PKG_ROOT}" ]; then
            echo "::error::${PKG_ROOT} does not exist"
            exit 1
          fi

          mapfile -t manifests < <(find "${PKG_ROOT}" -name package.json -not -path '*/node_modules/*' | sort || true)
          if [ "${#manifests[@]}" -eq 0 ]; then
            echo "No package.json files under ${PKG_ROOT}; skipping Node steps."
            exit 0
          fi

          for manifest in "${manifests[@]}"; do
            dir="$(dirname "${manifest}")"
            echo "::group::${dir}"
            npm ci --prefix "${dir}"
            npm run lint --if-present --prefix "${dir}"
            npm run typecheck --if-present --prefix "${dir}"
            npm run build --if-present --prefix "${dir}"
            npm run test --if-present --prefix "${dir}"
            echo "::endgroup::"
          done

  terraform-plan:
    name: Terraform plan — ${{ matrix.package }} (${{ matrix.environment }})
    needs: detect-packages
    if: needs.detect-packages.outputs.tf_matrix_json != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-packages.outputs.tf_matrix_json) }}

    steps:
      - uses: actions/checkout@v5

      - name: Apply Terraform log level from repository variables
        if: vars.TF_LOG_LEVEL != ''
        run: echo "TF_LOG=${{ vars.TF_LOG_LEVEL }}" >> "$GITHUB_ENV"

      - name: Enable Terraform debug logging (workflow dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enable_tf_debug == 'true' }}
        run: echo "TF_LOG=DEBUG" >> "$GITHUB_ENV"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || secrets.AWS_ASSUME_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Export AWS account context
        run: |
          echo "AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_ENV"
          echo "AWS_CALLER_ARN=$(aws sts get-caller-identity --query Arn --output text)" >> "$GITHUB_ENV"
          aws sts get-caller-identity

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform fmt (check)
        shell: bash
        run: |
          set -euo pipefail
          PKG="packages/${{ matrix.package }}/infra"
          terraform -chdir="${PKG}" fmt -check -recursive

      - name: Checkov (static)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: packages/${{ matrix.package }}/infra
          framework: terraform
          config_file: .checkov.yaml
          quiet: true

      - name: Terraform init / validate / plan
        shell: bash
        run: |
          set -euo pipefail
          PKG="packages/${{ matrix.package }}/infra"
          VAR_FILE="${GITHUB_WORKSPACE}/infra/vars/${{ matrix.environment }}.tfvars"
          if [ ! -f "${VAR_FILE}" ]; then
            echo "::error::Missing ${VAR_FILE}"
            exit 1
          fi

          PLAN_FILE="${{ matrix.package }}-${{ matrix.environment }}.tfplan"
          terraform -chdir="${PKG}" init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${{ matrix.package }}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -reconfigure

          terraform -chdir="${PKG}" validate
          terraform -chdir="${PKG}" plan \
            -var-file="${VAR_FILE}" \
            -input=false \
            "-out=${PLAN_FILE}"

      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.package }}-${{ matrix.environment }}
          path: packages/${{ matrix.package }}/infra/${{ matrix.package }}-${{ matrix.environment }}.tfplan
          if-no-files-found: error
          retention-days: 30

  lambda-artifacts:
    name: Lambda artifacts — ${{ matrix.package }} (${{ matrix.environment }})
    needs:
      - detect-packages
      - node-ci
    if: >-
      needs.detect-packages.outputs.tf_matrix_json != '[]' &&
      needs.node-ci.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-packages.outputs.tf_matrix_json) }}
    environment: ${{ matrix.environment }}

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC) — environment-specific override
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.environment == 'prod' && (secrets.AWS_ROLE_TO_ASSUME_PROD || secrets.AWS_ROLE_TO_ASSUME || secrets.AWS_ASSUME_ROLE) || (secrets.AWS_ROLE_TO_ASSUME_DEV || secrets.AWS_ROLE_TO_ASSUME || secrets.AWS_ASSUME_ROLE) }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            packages/**/package-lock.json

      - name: Build and upload Lambda artifacts to S3
        shell: bash
        run: |
          set -euo pipefail

          PKG_ROOT="packages/${{ matrix.package }}"
          BOT_CONFIG="${PKG_ROOT}/bot-config.json"
          VAR_FILE="${GITHUB_WORKSPACE}/infra/vars/${{ matrix.environment }}.tfvars"

          if [ ! -f "${VAR_FILE}" ]; then
            echo "::error::Missing ${VAR_FILE}"
            exit 1
          fi

          S3_BUCKET="$(awk -F= '
            /^[[:space:]]*s3_bucket[[:space:]]*=/ {
              gsub(/"/, "", $2)
              gsub(/[[:space:]]+/, "", $2)
              print $2
              exit
            }
          ' "${VAR_FILE}")"

          if [ -z "${S3_BUCKET}" ]; then
            echo "::error::s3_bucket is missing in ${VAR_FILE}"
            exit 1
          fi

          if [ ! -f "${BOT_CONFIG}" ]; then
            echo "No bot-config.json for ${{ matrix.package }}; skipping Lambda artifact upload."
            exit 0
          fi

          LAMBDAS="$(jq -r '
            .locales[]?.intents[]? |
            .fulfillment_lambda_name?, .lambda_config.function_name?
          ' "${BOT_CONFIG}" | sort -u | awk "NF" || true)"

          if [ -z "${LAMBDAS}" ]; then
            echo "No Lambda functions declared in ${BOT_CONFIG}; skipping artifact upload."
            exit 0
          fi

          echo "Target artifact bucket: ${S3_BUCKET}"

          while IFS= read -r lambda; do
            [ -z "${lambda}" ] && continue

            LAMBDA_PATH="${PKG_ROOT}/lambdas/${lambda}"
            if [ ! -d "${LAMBDA_PATH}" ]; then
              echo "::error::Lambda folder missing: ${LAMBDA_PATH}"
              exit 1
            fi

            if [ ! -f "${LAMBDA_PATH}/package.json" ]; then
              echo "::error::Missing package.json in ${LAMBDA_PATH}"
              exit 1
            fi

            echo "::group::Package ${lambda}"
            pushd "${LAMBDA_PATH}" >/dev/null

            if [ -f package-lock.json ]; then
              npm ci --no-audit --no-fund
            else
              npm install --no-audit --no-fund
            fi

            npm run build --if-present
            npm prune --omit=dev --no-audit --no-fund

            TMP_DIR="$(mktemp -d)"
            OUT_ZIP="${RUNNER_TEMP}/${lambda}.zip"

            if [ -d "dist" ]; then
              cp -R dist/. "${TMP_DIR}/"
            elif [ -f "index.js" ]; then
              cp "index.js" "${TMP_DIR}/"
            else
              echo "::error::No dist/ or index.js found for ${lambda}."
              exit 1
            fi

            if [ -d "node_modules" ]; then
              cp -R node_modules "${TMP_DIR}/"
            fi
            if [ -f "package.json" ]; then
              cp "package.json" "${TMP_DIR}/"
            fi

            (cd "${TMP_DIR}" && zip -rq "${OUT_ZIP}" .)
            popd >/dev/null
            echo "::endgroup::"

            aws s3 cp "${OUT_ZIP}" "s3://${S3_BUCKET}/${lambda}.zip" --sse AES256
            aws s3api head-object --bucket "${S3_BUCKET}" --key "${lambda}.zip" >/dev/null
            echo "Uploaded s3://${S3_BUCKET}/${lambda}.zip"
          done <<< "${LAMBDAS}"

  terraform-apply:
    name: Terraform apply — ${{ matrix.package }} (${{ matrix.environment }})
    needs:
      - detect-packages
      - node-ci
      - terraform-plan
      - lambda-artifacts
    if: >-
      needs.detect-packages.outputs.tf_matrix_json != '[]' &&
      needs.terraform-plan.result == 'success' &&
      needs.node-ci.result == 'success' &&
      needs.lambda-artifacts.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-packages.outputs.tf_matrix_json) }}
    # Matches infra/vars/<name>.tfvars — create the same names under Settings → Environments for approvals / secrets.
    environment: ${{ matrix.environment }}

    steps:
      - uses: actions/checkout@v5

      - name: Apply Terraform log level from repository variables
        if: vars.TF_LOG_LEVEL != ''
        run: echo "TF_LOG=${{ vars.TF_LOG_LEVEL }}" >> "$GITHUB_ENV"

      - name: Enable Terraform debug logging (workflow dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enable_tf_debug == 'true' }}
        run: echo "TF_LOG=DEBUG" >> "$GITHUB_ENV"

      - name: Configure AWS credentials (OIDC) — environment-specific override
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.environment == 'prod' && (secrets.AWS_ROLE_TO_ASSUME_PROD || secrets.AWS_ROLE_TO_ASSUME || secrets.AWS_ASSUME_ROLE) || (secrets.AWS_ROLE_TO_ASSUME_DEV || secrets.AWS_ROLE_TO_ASSUME || secrets.AWS_ASSUME_ROLE) }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Export AWS account context
        run: |
          echo "AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_ENV"
          echo "AWS_CALLER_ARN=$(aws sts get-caller-identity --query Arn --output text)" >> "$GITHUB_ENV"
          aws sts get-caller-identity

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Download saved Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.package }}-${{ matrix.environment }}
          path: packages/${{ matrix.package }}/infra/

      - name: Terraform init & apply (saved plan)
        shell: bash
        run: |
          set -euo pipefail
          PKG="packages/${{ matrix.package }}/infra"
          PLAN_FILE="${{ matrix.package }}-${{ matrix.environment }}.tfplan"
          VAR_FILE="${GITHUB_WORKSPACE}/infra/vars/${{ matrix.environment }}.tfvars"

          if [ ! -f "${PKG}/${PLAN_FILE}" ]; then
            echo "::error::Expected plan at ${PKG}/${PLAN_FILE}"
            exit 1
          fi
# Main branch pipeline — release automation (release-please), Node CI, Terraform plan → apply.
#
# Flow (happy path on push to main):
#   1. release-please opens / updates release PRs (requires conventional commits + manifest files).
#   2. Changed packages under packages/* are detected from the pushed commits.
