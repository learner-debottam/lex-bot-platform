name: CI - Release / Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: eu-west-2
  TERRAFORM_VERSION: 1.5.7
  NODE_VERSION: 24
  TF_STATE_BUCKET: debottam-learner-terraform-state-bucket
  TF_LOCK_TABLE: terraform-state-lock
  ENVIRONMENT: dev

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set-matrix.outputs.packages }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed packages
        id: set-matrix
        run: |
          #!/bin/bash
          set -e
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^packages/' || true)
          else
            git fetch origin main
            CHANGED=$(git diff --name-only origin/main HEAD | grep '^packages/' || true)
          fi

          PKGS=$(echo "$CHANGED" | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n")[:-1]')

          if [ -z "$PKGS" ] || [ "$PKGS" = "[]" ]; then
            echo "packages=[]" >> $GITHUB_OUTPUT
          else
            echo "packages=$PKGS" >> $GITHUB_OUTPUT
          fi

  apply:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.packages != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ASSUME_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Apply
        run: |
          PKG=packages/${{ matrix.package }}
          if [ -d "$PKG/infra" ]; then
            echo "Applying Terraform for $PKG"
            terraform -chdir=$PKG/infra init \
              -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
              -backend-config="key=${{ matrix.package }}/terraform.tfstate" \
              -backend-config="region=${{ env.AWS_REGION }}" \
              -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}" \
              -reconfigure

            terraform -chdir=$PKG/infra apply \
              -var-file=$GITHUB_WORKSPACE/infra/vars/${{ env.ENVIRONMENT }}.tfvars \
              -auto-approve
          fi